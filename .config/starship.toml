# Don't print a new line at the start of the prompt
add_newline = false
# Pipes в•°в”Җ в•ӯв”Җ
# Powerline symbols В оӮ° оӮұ оӮІ оӮі оӮҙ оӮө оӮ¶ оӮ· оӮё оӮ№ оӮә оӮ» оӮј оӮҪ оӮҫ оӮҝ оғҖ оғҒ оғӮ оғғ оғ„ оғ… оғҶ оғҮ оғҲ оғҠ  оғҢ оғҚ оғҺ оғҸ оғҗ оғ‘ оғ” оғ’ 
# Wedges рҹӯ§рҹӯ’ рҹӯЈрҹӯ§рҹӯ“
# Random noise рҹ¬–рҹ¬Ҙрҹ¬”рҹ¬—

# format = """
# $cmd_duration$username$hostname $directory $git_branch
# $character
# """


format = """
$cmd_duration$directory $rust $git_branch $git_status $package $golang $terraform $docker_context $python $docker_context $nodejs 
$character
"""

# Replace the "вқҜ" symbol in the prompt with "вһң"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[вҖўп‘„ пӮ©](bold fg:blue) "
error_symbol = "[вҖўп‘„ у°…ҷ](bold fg:red) "

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[elixir]
symbol = "оүө "

[elm]
symbol = "оҳ¬ "

[git_branch]
style = "bg: green"
format = " on [$symbol$branch(:$remote_branch)]($style) "
symbol = "пҗҳ "

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](blue)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[golang]
symbol = "оҳ§ "

[hg_branch]
symbol = "пҗҳ "

[java]
symbol = "оү– "

[julia]
symbol = "оҳӨ "

[memory_usage]
symbol = "пЎҡ "

[nim]
symbol = "пҡӨ "

[nix_shell]
symbol = "пӢң "

[perl]
symbol = "оқ© "

[php]
symbol = "оҳҲ "

[python]
symbol = "оҳҶ "
#pyenv_version_name = true
format = ' via [${symbol}python (${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[ruby]
symbol = "оҲҫ "

[rust]
style = "bold fg:#FF5F15"
format = ' [$symbol($version )]($style)'
symbol = "оһЁ "

[scala]
symbol = "оң· "

[shlvl]
symbol = "п„  "

[swift]
symbol = "пҜЈ "

[nodejs]
format = " via [пўҳ Node.js $version](bold green) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

[hostname]
ssh_only = false
format =  "[вҖў$hostname](bg:cyan bold fg:black)[оӮҙ](bold fg:cyan )"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:cyan fg:black"
style_root = "red bold"
format = "[оӮ¶](bold fg:cyan)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = " п‘ӯ "
read_only = " п‘– "
style = "bg:blue fg:black"
truncation_length = 6
truncation_symbol = "вҖўвҖў/"
format = '[оӮ¶](bold fg:blue)[$path ]($style)[оӮҙ](bold fg:blue)'

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:yellow)[оӯұ $duration](bold bg:yellow fg:black)[оӮҙ](bold fg:yellow) вҖўвҖў '