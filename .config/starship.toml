# Don't print a new line at the start of the prompt
add_newline = false
# Pipes тХ░тФА тХнтФА
# Powerline symbols ┬аюВ░ юВ▒ юВ▓ юВ│ юВ┤ юВ╡ юВ╢ юВ╖ юВ╕ юВ╣ юВ║ юВ╗ юВ╝ юВ╜ юВ╛ юВ┐ юГА юГБ юГВ юГГ юГД юГЕ юГЖ юГЗ юГИ юГК  юГМ юГН юГО юГП юГР юГС юГФ юГТ 
# Wedges ЁЯнзЁЯнТ ЁЯнгЁЯнзЁЯнУ
# Random noise ЁЯмЦЁЯмеЁЯмФЁЯмЧ

# format = """
# $cmd_duration$username$hostname $directory $git_branch
# $character
# """

right_format = """\
$cmd_duration
"""

format = """
$username$hostname$directory$rust$git_branch$git_status$package$golang$terraform$docker_context$python$docker_context$nodejs
$character
"""

# Replace the "тЭп" symbol in the prompt with "тЮЬ"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[ЁЯнзЁЯнТ](bold fg:blue)[ тЮЬ ](bold bg:blue fg:#000000)[юВ░](bold fg:blue)"
error_symbol = "[ЁЯнзЁЯнТ](bold fg:red)[ тЬЧ ](bold bg:red fg:#000000)[юВ░](bold fg:red)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[elixir]
symbol = "юЙ╡ "

[elm]
symbol = "юШм "

[git_branch]
style = "bg: green"
format = " on [$symbol$branch(:$remote_branch)]($style) "
symbol = "яРШ "

[golang]
symbol = "юШз "

[hg_branch]
symbol = "яРШ "

[java]
symbol = "юЙЦ "

[julia]
symbol = "юШд "

[memory_usage]
symbol = "ябЪ "

[nim]
symbol = "яЪд "

[nix_shell]
symbol = "яЛЬ "

[perl]
symbol = "юЭй "

[php]
symbol = "юШИ "

[python]
symbol = "юШЖ "
#pyenv_version_name = true
format = ' via [${symbol}python (${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[ruby]
symbol = "юИ╛ "

[rust]
style = "bold fg:#FF5F15"
format = ' [$symbol($version )]($style)'
symbol = "юЮи "

[scala]
symbol = "юЬ╖ "

[shlvl]
symbol = "яДа "

[swift]
symbol = "япг "

[nodejs]
format = " via [явШ Node.js $version](bold green) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

[hostname]
ssh_only = false
format =  "[юВ╝ ](bold bg:yellow fg:blue)[$hostname ](bg:yellow bold fg:#000000)[юВ╝ ](bold fg:yellow bg:green)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[time]
disabled = true
format = 'ЁЯХЩ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:blue fg:#000000"
style_root = "red bold"
format = "[ЁЯнГ](bold fg:blue)[$user ]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "яАХ "
read_only = " яАг "
style = "bold bg:green  fg:#000000"
truncation_length = 2
truncation_symbol = "./"
format = '[$path]($style)[ЁЯнЮ](fg:green )'


[directory.substitutions]
"Documents" = " яЬШ"
"/" = "/"
"Downloads" = "яАЩ "
"Music" = " яАБ"
"Pictures" = " яА╛"

[cmd_duration]
min_time = 0
format = '[ЁЯмИЁЯмЦЁЯмеЁЯмЕ ](bold bg:cyan fg:#000000)[time:$duration](bold bg:cyan fg:#000000)[ ЁЯмЦЁЯмеЁЯмФЁЯмЧ](bold bg:cyan fg:#000000)'

[git_status]
conflicted = "ЁЯП│"
ahead = "ЁЯПОЁЯТи"
behind = "ЁЯШ░"
diverged = "ЁЯШ╡"
untracked = "ЁЯд╖"
stashed = "ЁЯУж"
modified = "ЁЯУЭ"
staged = '[++\($count\)](blue)'
renamed = "тЬНя╕П"
deleted = "ЁЯЧС"
